---
openapi: 3.0.1
info:
  title: RightDocuments API
  version: v1
paths:
  "/api/v1/catalog":
    get:
      summary: Enumerate valid values for entity_type, formation_state, and status
      description: Public catalog of accepted enum values. No authentication required.
      tags:
      - Catalog
      security: []
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity_types:
                    type: array
                    items:
                      type: string
                  formation_states:
                    type: array
                    items:
                      type: string
                  entity_statuses:
                    type: array
                    items:
                      type: string
                  formation_requirements:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          required_tag:
                            type: string
                          description:
                            type: string
  "/api/v1/documents/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    delete:
      summary: Delete a document
      tags:
      - Documents
      security:
      - bearer: []
      - oauth2:
        - documents:write
      responses:
        '204':
          description: deleted
        '403':
          description: missing documents:write scope
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: wrong organization
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    get:
      summary: Show a document
      tags:
      - Documents
      security:
      - bearer: []
      - oauth2:
        - documents:read
      responses:
        '200':
          description: success with download_url
        '404':
          description: wrong organization
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update document metadata (tags, name)
      tags:
      - Documents
      security:
      - bearer: []
      - oauth2:
        - documents:write
      parameters: []
      responses:
        '200':
          description: updated
        '403':
          description: missing documents:write scope
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tag_list:
                  type: string
                  description: Comma-separated tags
                name:
                  type: string
                  description: Display name for imported documents
  "/api/v1/entities/{entity_id}/documents/import":
    parameters:
    - name: entity_id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: Import a PDF as an executed document
      tags:
      - Documents
      security:
      - bearer: []
      - oauth2:
        - documents:write
      parameters: []
      responses:
        '201':
          description: imported
        '403':
          description: missing documents:write scope
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: no file
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
  "/api/v1/entities/{entity_id}/documents":
    parameters:
    - name: entity_id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: List documents for an entity
      tags:
      - Documents
      security:
      - bearer: []
      - oauth2:
        - documents:read
      responses:
        '200':
          description: success
        '404':
          description: entity in another organization
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/entities":
    get:
      summary: List entities in the token's organization
      tags:
      - Entities
      security:
      - bearer: []
      - oauth2:
        - documents:read
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - name
                      - entity_type
                      - state
                      - status
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        entity_type:
                          type: string
                        state:
                          type: string
                        status:
                          type: string
                        formation_date:
                          type: string
                          nullable: true
    post:
      summary: Create an entity in the token's organization
      tags:
      - Entities
      security:
      - bearer: []
      - oauth2:
        - documents:write
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: missing documents:write scope
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - entity
              properties:
                entity:
                  type: object
                  required:
                  - name
                  - entity_type
                  - formation_state
                  properties:
                    name:
                      type: string
                    entity_type:
                      type: string
                      enum:
                      - C-Corporation
                      - S-Corporation
                      - Limited Liability Company
                      - General Partnership
                      - Limited Partnership
                      - Limited Liability Partnership
                    formation_state:
                      type: string
                      enum:
                      - California
                      - Delaware
                    status:
                      type: string
                      enum:
                      - Unformed
                      - Incorporation Filed
                      - Incorporation Certified
                      - Operating
                      - Dissolution Filed
                      - Dissolution Certified
                    formation_date:
                      type: string
                      format: date
                      nullable: true
                    ein:
                      type: string
                      nullable: true
                    address:
                      type: string
                      nullable: true
                    phone:
                      type: string
                      nullable: true
  "/api/v1/entities/{id}":
    parameters:
    - name: id
      in: path
      description: Entity UUID
      required: true
      schema:
        type: string
    get:
      summary: Show an entity in the token's organization
      tags:
      - Entities
      security:
      - bearer: []
      - oauth2:
        - documents:read
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity:
                    type: object
                    required:
                    - id
                    - name
                    - entity_type
                    - state
                    - status
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      entity_type:
                        type: string
                      state:
                        type: string
                      status:
                        type: string
                      formation_date:
                        type: string
                        nullable: true
                      ein:
                        type: string
                        nullable: true
                      duns:
                        type: string
                        nullable: true
                      website_url:
                        type: string
                        nullable: true
                      address:
                        type: string
                        nullable: true
                      county:
                        type: string
                        nullable: true
                      phone:
                        type: string
                        nullable: true
                      file_number:
                        type: string
                        nullable: true
                      fiscal_year_end_month_day:
                        type: string
                        nullable: true
                      shares_authorized:
                        type: integer
                        nullable: true
                      registered_agent_name:
                        type: string
                        nullable: true
                      registered_agent_address:
                        type: string
                        nullable: true
                      incorporator_name:
                        type: string
                        nullable: true
                      incorporator_address:
                        type: string
                        nullable: true
                      incorporator_resigned_on:
                        type: string
                        nullable: true
                      officer_1_name:
                        type: string
                        nullable: true
                      officer_1_title:
                        type: string
                        nullable: true
                      officer_1_email:
                        type: string
                        nullable: true
                      officer_2_name:
                        type: string
                        nullable: true
                      officer_2_title:
                        type: string
                        nullable: true
                      officer_2_email:
                        type: string
                        nullable: true
                      officer_3_name:
                        type: string
                        nullable: true
                      officer_3_title:
                        type: string
                        nullable: true
                      officer_3_email:
                        type: string
                        nullable: true
                      created_at:
                        type: string
                      updated_at:
                        type: string
        '404':
          description: entity belongs to another organization
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: missing token
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/me":
    get:
      summary: Returns the user and the token-bound organization
      tags:
      - Me
      security:
      - bearer: []
      - oauth2:
        - documents:read
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                        nullable: true
                  organization:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      google_domain:
                        type: string
        '401':
          description: missing token
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/templates":
    post:
      summary: Create a template in the token's organization
      tags:
      - Templates
      security:
      - bearer: []
      - oauth2:
        - documents:write
      parameters: []
      responses:
        '201':
          description: created
        '422':
          description: validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: missing documents:write scope
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - template
              properties:
                template:
                  type: object
                  required:
                  - name
                  - content
                  properties:
                    name:
                      type: string
                    content:
                      type: string
                      description: Markdown content with {{field}} placeholders
                    description:
                      type: string
                      nullable: true
                    public:
                      type: boolean
                      default: false
                    tag_list:
                      type: string
                      description: Comma-separated tags
                      nullable: true
servers:
- url: https://app.rightdocuments.com
- url: http://localhost:3000
security:
- bearer: []
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        urn:ietf:params:oauth:grant-type:device_code:
          tokenUrl: "/oauth/token"
          scopes:
            documents:read: Read documents
            documents:write: Create/import documents
    bearer:
      type: http
      scheme: bearer
      description: Bearer token obtained via OAuth2 device flow (see oauth2 scheme).
  schemas:
    Error:
      type: object
      required:
      - error
      - message
      - status
      properties:
        error:
          type: string
          example: not_found
        message:
          type: string
        status:
          type: integer
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
